<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="css/style.css">
  <title>Momentum App</title>
</head>
<body>
  <header class="search-header">
    <i class="fa-solid fa-magnifying-glass fa-2x"></i>
    <form id="search-form">
      <input autofocus id="search-input" type="text" class="search-header__searching" placeholder="Search Google" />
    </form>
  </header>
  <div class="center-container">
    <div id="weather">
      <span></span>
      <span></span>
    </div>
    <h2 id="clock">00:00:00</h2>
    <form id="login-form" class="hidden">
      <input required maxlength="15" type="text" placeholder="What is your name?">
      <button>Log In</button>
    </form>
    <h1 id="greeting" class="hidden"></h1>
  </div>

  <div class="todo-container">
    <div class="todo-container__todo-list">
      <ul class="todo-container__todo-item" id="todo-list"></ul>
    </div>
    <div class="todo-container__input">
      <form class="todo-container__form" id="todo-form">
        <input required type="text" placeholder="Write a To Do and Press Enter">
      </form>
    </div>
  </div>

  <div id="quote">
    <span></span>
    <span></span>
  </div>

  <script src="https://kit.fontawesome.com/614191dbd5.js" crossorigin="anonymous"></script>
  <script src="js/greetings.js"></script>
  <script src="js/clock.js"></script>
  <script src="js/quotes.js"></script>
  <script src="js/background.js"></script>
  <script src="js/todo.js"></script>
  <script src="js/weather.js"></script>
  <script src="js/search.js"></script>
</body>
</html>
